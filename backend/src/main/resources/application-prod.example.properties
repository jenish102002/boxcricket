# EXAMPLE PRODUCTION POSTGRESQL CONFIGURATION
# Copy this file to application-prod.properties and replace with real values if you aren't using Environment Variables.
spring.datasource.url=jdbc:postgresql://your-database-hostname:5432/boxcricketdb
spring.datasource.username=boxcricketdb_user
spring.datasource.password=your_secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Override JWT secret if provided
jwt.secret=REPLACE_WITH_LONG_RANDOM_SECRET_STRING
