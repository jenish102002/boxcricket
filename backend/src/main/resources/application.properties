spring.application.name=boxcricket-backend
server.port=8080

# ===== SQLite DataSource =====
spring.datasource.url=jdbc:sqlite:./boxcricket.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
app.jwt.secret=3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e
app.jwt.expiration=86400000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:5173

# ===== Logging =====
logging.level.com.boxcricket=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ===== Swagger / OpenAPI =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
